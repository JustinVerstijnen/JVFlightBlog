baseURL: https://flightblog.justinverstijnen.nl
title: JV Flight Blog

# Language settings
contentDir: content/en
defaultContentLanguage: en
defaultContentLanguageInSubdir: false
# Useful when translating.
enableMissingTranslationPlaceholders: true
enableRobotsTXT: true

# Will give values to .Lastmod etc.
enableGitInfo: true

# Comment out to disable taxonomies in Docsy
# disableKinds: [taxonomy]

# Menu Pages
sectionPagesMenu: main

# You can add your own taxonomies
taxonomies:
  tag: tags
  category: categories

# Highlighting config
pygmentsCodeFences: true
pygmentsUseClasses: false
# Use the new Chroma Go highlighter in Hugo.
pygmentsUseClassic: false
# pygmentsOptions: "linenos=table"
# See https://help.farbox.com/pygments.html
pygmentsStyle: tango

mediaTypes:
  text/redirects:
    delimiter: ''

outputFormats:
  redirects:
    baseName: _redirects
    isPlainText: true
    mediaType: text/redirects
    root: true

# Configure how URLs look like per section.
permalinks:
  blog: /:section/:year/:month/:day/:slugorcontentbasename

# Image processing configuration.
imaging:
  resampleFilter: CatmullRom
  quality: 75
  anchor: smart

# Language configuration
languages:
  en:
    languageName: English
    title: Flight Blog | Justin Verstijnen
    params:
      description: A Docsy example site
  # cSpell:disable
  no:
    languageName: Norsk
    contentDir: content/no
    title: Gulldoks
    params:
      description: Docsy er operativsystem for skyen
      time_format_default: 02.01.2006
      time_format_blog: 02.01.2006
  fa:
    languageDirection: rtl
    languageName: 'فارسی (Persian)'
    contentDir: content/fa
    title: 'اسناد گلدی'
    params:
      description: 'یک نمونه برای پوسته داکسی'
      time_format_default: 2006.01.02
      time_format_blog: 2006.01.02
  # cSpell:enable

markup:
  goldmark:
    parser:
      attribute:
        block: true
    renderer:
      unsafe: true
  highlight:
    style: tango
    noClasses: false # Required for dark-mode support of code blocks

# Comment out if you don't want the "print entire section" link enabled.
outputs:
  home: [HTML, print, RSS, redirects]
  section: [HTML, print, RSS]

params:
  taxonomy:
    # set taxonomyCloud = [] to hide taxonomy clouds
    taxonomyCloud: [tags, categories]

    # If used, must have same length as taxonomyCloud
    taxonomyCloudTitle: [Tag Cloud, Categories]

    # set taxonomyPageHeader = [] to hide taxonomies on the page headers
    taxonomyPageHeader: [tags, categories]

  privacy_policy: https://policies.google.com/privacy

  # First one is picked as the Twitter card image if not set on page.
  # images: [images/project-illustration.png]

  # Menu title if your navbar has a versions selector to access old versions of your site.
  # This menu appears only if you have at least one [params.versions] set.
  version_menu: Releases
  archived_version: false
  version: 0.14.3
  versionWithBuildId: 0.14.3
  github_repo: https://github.com/google/docsy-example
  github_project_repo: https://github.com/google/docsy
  github_branch: main
  gcs_engine_id: d72aa9b2712488cc3
  offlineSearch: false
  prism_syntax_highlighting: false

# #ooter
  copyright:
    authors: >-
      Justin Verstijnen |
    from_year: 2018
    to_year: present

  # User interface configuration
  ui:
    # Set to true to disable breadcrumb navigation.
    breadcrumb_disable: false
    # Set to false if you don't want to display a logo (/assets/icons/logo.svg) in the top navbar
    navbar_logo: true
    # Set to true if you don't want the top navbar to be translucent when over a `block/cover`, like on the homepage.
    navbar_translucent_over_cover_disable: false

    sidebar_menu_foldable: true
    # Enable to show the side bar menu in its compact state.
    sidebar_menu_compact: false
    # Set to true to hide the sidebar search box (the top nav search box will still be displayed if search is enabled)
    sidebar_search_disable: false
    # Enable light/dark mode toggle menu in the navbar
    showLightDarkModeMenu: true

    feedback:
      enable: true
      # The responses that the user sees after clicking "yes" (the page was helpful) or "no" (the page was not helpful).
      yes: >-
        Glad to hear it! Please <a
        href="https://github.com/USERNAME/REPOSITORY/issues/new">tell us how we
        can improve</a>.
      no: >-
        Sorry to hear that. Please <a
        href="https://github.com/USERNAME/REPOSITORY/issues/new">tell us how we
        can improve</a>.

    readingtime:
      enable: true
  mainBranchPreviewURL: https://main--goldydocs.netlify.app/
  btn-lg: class="btn btn-lg btn-{1}" role="button"
  FA: <i class="fa-{1} fa-{2} text-{3} px-1"></i>

  links:
    # Developer relevant links. These will show up on right side of footer and in the community page if you have one.
    developer:
      - name: Site information
        url: /site/
        icon: fa-solid fa-hammer
        desc: Site build information.
      - name: Send me an email
        url: mailto:info@justinverstijnen.nl
        icon: fa fa-envelope
        desc: Discuss development issues around the project

security:
  funcs: # cspell:disable-line
    getenv: # cspell:disable-line
      # Netlify build env var
      - ^(BRANCH|BUILD_ID|COMMIT_REF|CONTEXT|DEPLOY_ID|NETLIFY|PULL_REQUEST|REVIEW_ID)$

module:
  # Uncomment the next line to build and serve using local docsy clone declared in the named Hugo workspace:
  # workspace: docsy.work
  hugoVersion:
    extended: true
    min: 0.155.0
  imports:
    - path: github.com/google/docsy
      disable: false
