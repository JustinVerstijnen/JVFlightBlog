name: Deploy Hugo site to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      HUGO_ENVIRONMENT: production
      HUGO_ENV: production
      HUGO_CACHEDIR: ${{ runner.temp }}/hugo_cache

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v6

      - name: Setup Node.js for PostCSS
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install Node dependencies
        run: |
          if [ -f package-lock.json ] || [ -f npm-shrinkwrap.json ]; then
            npm ci
          elif [ -f package.json ]; then
            npm install
          else
            echo "No package.json found, skipping npm install"
          fi

      - name: Setup Hugo extended
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.160.0"
          extended: true

      - name: Build site
        run: hugo --minify --gc --baseURL "${{ steps.pages.outputs.base_url }}/"

      - name: Sanity check build output
        run: |
          echo "Checking public directory..."
          test -d public
          test -f public/index.html

          echo "Checking for symlinks..."
          if find public -type l | grep -q .; then
            echo "Error: symlinks found in public directory"
            find public -type l
            exit 1
          fi

          echo "Checking artifact size..."
          du -sh public

          echo "First files in public:"
          find public -maxdepth 2 -type f | head -50

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
